        navy: '#0B1D3A',

function checkRegistration() {
  userData = JSON.parse(localStorage.getItem('atlas_user') || 'null');
  return userData ? true : false;
}

function showRegistration() {
  const regScreen = document.getElementById('registration-screen');
  const app = document.getElementById('app');
  if (regScreen) regScreen.classList.remove('hidden');
  if (app) app.classList.add('hidden');
}

function hideRegistration() {
  const regScreen = document.getElementById('registration-screen');
  const app = document.getElementById('app');
  if (regScreen) regScreen.classList.add('hidden');
  if (app) {
    app.classList.remove('hidden');
    app.classList.add('flex', 'flex-col');
  }
}

function updateUserWatermark() {
  const watermarkEl = document.getElementById('user-watermark');
  const logoutBtn = document.getElementById('logout-button');
  if (!watermarkEl) return;

  if (userData) {
    watermarkEl.innerHTML = `
      <div class="flex items-center gap-2.5">
        <div class="flex h-8 w-8 items-center justify-center rounded-full bg-white/15 ring-1 ring-white/20">
          <i data-lucide="user-circle" class="h-4 w-4"></i>
        </div>
        <div class="min-w-0 text-right">
          <div class="truncate text-[11px] font-semibold leading-tight">${userData.nama_lengkap}</div>
          <div class="mt-0.5 text-[10px] text-white/75">${userData.nim} • ${userData.kelas}</div>
        </div>
      </div>
    `;
    watermarkEl.classList.remove('hidden');
    watermarkEl.style.display = 'block';
    if (logoutBtn) {
      logoutBtn.classList.remove('hidden');
      logoutBtn.style.display = 'inline-flex';
    }
    if (window.lucide) lucide.createIcons();
  } else {
    watermarkEl.innerHTML = '';
    watermarkEl.classList.add('hidden');
    watermarkEl.style.display = 'none';
    if (logoutBtn) {
      logoutBtn.classList.add('hidden');
      logoutBtn.style.display = 'none';
    }
  }
}

function logoutUser() {
  localStorage.removeItem('atlas_user');
  userData = null;
  allUsers = [];
  quizStates = {};
  quizTimers = {};
  pendingOwnerReportResults = [];
  currentPage = 'home';
  isInitialized = false;
  openSections = {};
  localStorage.removeItem('atlas_owner_quiz_results_pending');
  
  // Clear all timers
  Object.keys(quizTimers).forEach(key => {
    if (quizTimers[key]) clearInterval(quizTimers[key]);
  });
  
  // Hide app and show registration
  const app = document.getElementById('app');
  const regScreen = document.getElementById('registration-screen');
  if (app) app.classList.add('hidden');
  if (regScreen) regScreen.classList.remove('hidden');
  
  updateUserWatermark();
  
  // Reset and rebuild form
  const form = document.getElementById('registration-form');
  if (form) {
    form.reset();
    form.onsubmit = null;
    clearErrors();
    buildRegistrationForm();
  }
}
</script>

  <script>
// ============ REGISTRATION FORM ============
function buildRegistrationForm() {
  const form = document.getElementById('registration-form');
  if (!form) {
    console.error('❌ Form element not found');
    return;
  }
  
  // Remove old listener to prevent duplicates
  form.onsubmit = null;
  
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    console.log('✓ Form submitted');
    clearErrors();
    
    const namaLengkap = document.getElementById('nama-lengkap').value.trim();
    const nim = document.getElementById('nim').value.trim();
    const kelas = document.getElementById('kelas').value.trim();
    
    let hasError = false;
    
    if (!namaLengkap) {
      showError('nama-lengkap', 'Nama lengkap harus diisi');
      hasError = true;
    }
    if (!nim) {
      showError('nim', 'NIM harus diisi');
      hasError = true;
    }
    if (!kelas) {
      showError('kelas', 'Kelas harus diisi');
      hasError = true;
    }
    
    if (hasError) return;
    
    // Create user data object
    userData = { 
      nama_lengkap: namaLengkap, 
      nim: nim, 
      kelas: kelas,
      user_id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
    };
    
    // Save to localStorage synchronously
    try {
      const jsonStr = JSON.stringify(userData);
      localStorage.setItem('atlas_user', jsonStr);
      console.log('✓ localStorage.setItem called');
      console.log('✓ User data saved:', userData);
    } catch (err) {
      console.error('❌ Error saving to localStorage:', err);
      showError('nama-lengkap', 'Gagal menyimpan data. Coba lagi.');
      return;
    }
    
    // Verify immediately
    const savedJson = localStorage.getItem('atlas_user');
    console.log('✓ Verification read:', savedJson);
    
    if (!savedJson) {
      console.error('❌ Verification failed: data not found in localStorage');
      showError('nama-lengkap', 'Gagal menyimpan data. Coba lagi.');
      return;
    }
    
    try {
      const parsed = JSON.parse(savedJson);
      console.log('✓ Verification passed:', parsed);
    } catch (err) {
      console.error('❌ Parse error:', err);
      return;
    }
    
    // 1. Clear form
    form.reset();
    clearErrors();
    
    // 2. Stop ALL running timers immediately
    for (let key in quizTimers) {
      if (quizTimers[key]) {
        clearInterval(quizTimers[key]);
      }
    }
    quizTimers = {};
    
    // 3. Clear quiz states
    quizStates = {};
    
    // 4. Reset page state
    currentPage = 'home';
    openSections = {};
    
    // 5. Hide registration
    const registScreen = document.getElementById('registration-screen');
    if (registScreen) registScreen.classList.add('hidden');
    
    // 6. Show app
    const app = document.getElementById('app');
    if (app) {
      app.classList.remove('hidden');
      app.classList.add('flex', 'flex-col');
    }
    
    // 7. Close modal if open
    const modal = document.getElementById('quiz-modal');
    if (modal) modal.classList.remove('show');
    
    // 8. Update watermark
    updateUserWatermark();
    
    // 9. Build sidebar fresh
    buildSidebar();
    
    // 10. Render home content
    renderContent();
    
    // 11. Apply theme
    try { applyConfig(defaultConfig); } catch(e) {}
    
    // 12. Create icons
    lucide.createIcons();
    
    // 13. Initialize SDK
    initElementSdk();
    
    // 14. Highlight home nav
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('bg-white/15', b.dataset.nav === 'home');
    });
    
    // 15. Scroll to top
    const mc = document.getElementById('main-content');
    if (mc) {
      mc.scrollTop = 0;
      setTimeout(() => { mc.scrollTop = 0; }, 50);
    }
  }, { once: false });
}

function showError(fieldId, message) {
  const field = document.getElementById(fieldId);
  if (field) {
    const parent = field.closest('div');
    if (parent) {
      const errorDiv = parent.querySelector('.error-msg');
      if (errorDiv) {
        errorDiv.textContent = message;
        errorDiv.classList.remove('hidden');
      }
    }
  }
}

function clearErrors() {
  document.querySelectorAll('.error-msg').forEach(el => {
    el.textContent = '';
    el.classList.add('hidden');
  });
  document.getElementById('form-error').classList.add('hidden');
}

// Anti-cheating: detect visibility changes, focus loss, right-click, copy attempts
document.addEventListener('visibilitychange', () => {
  if (document.hidden && quizStates[currentPage]?.submitted === false) {
    if (!quizStates[currentPage]?.warningShown) {
      showInlineWarning('⚠️ Larangan: Jangan pindah tab saat mengerjakan kuis!', 3000);
      quizStates[currentPage].warningShown = true;
    }
  }
});

window.addEventListener('blur', () => {
  if (quizStates[currentPage]?.submitted === false && !document.hidden) {
    showInlineWarning('⚠️ Kuis terdeteksi: Tetap fokus pada jendela ini', 2000);
  }
});

document.addEventListener('contextmenu', (e) => {
  if (quizStates[currentPage]?.submitted === false) {
    e.preventDefault();
    showInlineWarning('🚫 Klik kanan dinonaktifkan selama kuis', 1500);
  }
});

document.addEventListener('copy', (e) => {
  if (quizStates[currentPage]?.submitted === false) {
    e.preventDefault();
    showInlineWarning('🚫 Copy dinonaktifkan selama kuis', 1500);
  }
});

function showInlineWarning(msg, duration) {
  let warn = document.getElementById('anti-cheat-warn');
  if (!warn) {
    warn = document.createElement('div');
    warn.id = 'anti-cheat-warn';
    warn.className = 'fixed top-4 right-4 z-50 bg-red-500 text-white px-4 py-2.5 rounded-lg text-xs md:text-sm font-semibold shadow-lg flex items-center gap-2';
    document.body.appendChild(warn);
  }
  warn.textContent = msg;
  warn.style.display = 'block';
  warn.style.animation = 'fadeUp 0.3s ease';
  clearTimeout(warn.hideTimeout);
  warn.hideTimeout = setTimeout(() => { warn.style.display = 'none'; }, duration);
}

// ============ SIDEBAR ============
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  SIDEBAR.forEach(section => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-section-btn w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left font-semibold text-sm text-navy';
    btn.innerHTML = `<i data-lucide="${section.icon}" class="w-4 h-4 flex-shrink-0"></i><span class="flex-1">${section.label}</span>${section.children ? '<i data-lucide="chevron-down" class="w-3 h-3 transition-transform '+(openSections[section.id]?'rotate-180':'')+'"></i>' : ''}`;
    if (!section.children) {
      btn.onclick = () => { setActive(section.id); };
    } else {
      btn.onclick = () => { openSections[section.id] = !openSections[section.id]; buildSidebar(); };
    }
    if (section.id === currentPage || (section.children && section.children.some(c => c.id === currentPage))) btn.classList.add('active');
    nav.appendChild(btn);

    if (section.children) {
      const sub = document.createElement('div');
      sub.className = 'sub-items pl-4 space-y-0.5' + (openSections[section.id] ? ' open' : '');
      section.children.forEach(child => {
        if (child.isLabel) {
          const lbl = document.createElement('div');
          lbl.className = 'text-[11px] font-bold text-steel/60 uppercase tracking-wider pt-3 pb-1 px-3';
          lbl.textContent = child.label;
          sub.appendChild(lbl);
        } else {
          const item = document.createElement('div');
          item.className = 'sidebar-item' + (currentPage === child.id ? ' active' : '');
          item.textContent = child.label;
          item.onclick = () => setActive(child.id);
          sub.appendChild(item);
        }
      });
      nav.appendChild(sub);
    }

function setActive(id) {
  currentPage = id;
  // Stop any running timer
  if (quizTimers[id]) clearInterval(quizTimers[id]);
  // Auto-open parent by matching parent property
  SIDEBAR.forEach(section => {
    if (section.children) {
      section.children.forEach(child => {
        if (child.id === id && section.id) {
          openSections[section.id] = true;
        }
      });
    }
  });
  buildSidebar();
  renderContent();
  closeSidebar();
  // Highlight nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('bg-white/15', b.dataset.nav === getNavGroup(id));
  });
}

function getNavGroup(id) {
  if (id === 'home') return 'home';
  if (id === 'terminologi') return 'terminologi';
  const axialIds = ['cranium','vertebralis','costae','sternum'];
  if (axialIds.includes(id)) return 'axial';
  return 'appendicular';
}

function navigateTo(group) {
  const map = { home:'home', terminologi:'terminologi', axial:'cranium', appendicular:'cingulum_superior' };
  currentPage = map[group] || 'home';
  // Stop any running quiz timer
  if (quizTimers[currentPage]) clearInterval(quizTimers[currentPage]);
  // Clear quiz state if navigating away from quiz
  Object.keys(quizTimers).forEach(key => {
    if (key !== currentPage && quizTimers[key]) clearInterval(quizTimers[key]);
  });
  buildSidebar();
  renderContent();
  closeSidebar();
  // Highlight nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('bg-white/15', b.dataset.nav === group);
  });
  // Scroll to top
  const mainContent = document.getElementById('main-content');
  if (mainContent) mainContent.scrollTop = 0;
}

  if (qs.submitted) html += `<span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">Selesai</span>`;
  html += `</div>`;

  if (!qs.submitted) {
    qs.questions.forEach((q, qi) => {
      html += `<div class="mb-6 p-4 bg-gray-50 rounded-lg"><p class="font-semibold text-navy text-sm mb-3">${qi+1}. ${q.q}</p><div class="space-y-2">`;
      
      q.shuffledOptions.forEach((opt, displayOi) => {
        const origOi = opt.origIdx;
        let cls = 'quiz-option text-sm w-full text-left';
        
        if (qs.answers[qi] === displayOi) {
          cls += ' !border-ocean !bg-sky';
        }
        
        html += `<div class="${cls}" onclick="selectQuiz('${qid}',${qi},${displayOi})">${String.fromCharCode(65+displayOi)}. ${opt.text}</div>`;
      });
      
      html += `</div></div>`;
    });

    html += `<button onclick="submitQuiz('${qid}')" class="w-full mt-4 px-6 py-3 bg-ocean text-white rounded-lg font-semibold text-sm hover:bg-blue-700 transition flex items-center justify-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i>Kirim Jawaban</button>`;
  } else {
    // Calculate score
    let score = 0;
    qs.questions.forEach((q, qi) => {
      if (qs.answers[qi] !== undefined) {
        const displayOi = qs.answers[qi];
        const origOi = q.shuffledOptions[displayOi].origIdx;
        if (origOi === q.answer) score++;
      }
    });
    
    const pct = Math.round(score/qs.questions.length*100);
    const timeSpent = Math.floor((qs.endTime - qs.startTime) / 1000);
    const mins = Math.floor(timeSpent / 60);
    const secs = timeSpent % 60;
    const color = pct >= 80 ? 'text-green-600 bg-green-50 border-green-200' : pct >= 60 ? 'text-yellow-700 bg-yellow-50 border-yellow-200' : 'text-red-600 bg-red-50 border-red-200';

    if (qs.timeExpired) {
      html += `<div class="text-xs bg-red-200/50 border border-red-300 rounded px-2 py-1 inline-block">⏰ Waktu habis sebelum selesai</div>`;
    }
    html += `</div>`;
    
    // Show answer review
    html += `<div class="mt-6 space-y-3"><h3 class="font-semibold text-navy text-sm mb-3">Review Jawaban:</h3>`;
    qs.questions.forEach((q, qi) => {
      if (qs.answers[qi] !== undefined) {
        const displayOi = qs.answers[qi];
        const origOi = q.shuffledOptions[displayOi].origIdx;
        const isCorrect = origOi === q.answer;
        const userAns = q.shuffledOptions[displayOi].text;
        const correctAns = q.originalOptions[q.answer];
        
        html += `<div class="p-3 rounded-lg ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">

        </div>`;
      }
    });
    html += `</div>`;
    
    html += `<button onclick="resetQuiz('${qid}'); closeQuizModal();" class="w-full mt-4 px-5 py-2.5 bg-gray-100 text-navy rounded-lg font-medium text-sm hover:bg-gray-200 transition">Ulangi Kuis</button>`;
  }

  body.innerHTML = html;
  modal.classList.add('show');
  lucide.createIcons();
};

// ============ QUIZ ============
// Randomize questions and options
function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getQuizState(qid) {
  if (!quizStates[qid]) {
    const data = DATA[qid];
    if (!data?.quiz) return null;
    // Randomize questions
    const shuffled = shuffleArray(data.quiz).map(q => ({
      ...q,
      originalOptions: q.options,
      shuffledOptions: shuffleArray(q.options.map((opt, i) => ({ text: opt, origIdx: i }))),
      userAnswer: null,
    }));
    quizStates[qid] = {
      answers: {},
      submitted: false,
      startTime: Date.now(),
      sessionId: SESSION_ID,
      questions: shuffled,
      warningShown: false,
    };
  }
  return quizStates[qid];
}

window.selectQuiz = function(qid, qi, displayOi) {
  const qs = getQuizState(qid);
  if (!qs || qs.submitted) return;
  qs.answers[qi] = displayOi;
  // Update modal without closing
  openQuizModal(qid);
};

window.submitQuiz = function(qid) {
  const qs = getQuizState(qid);
  if (!qs) return;
  const data = DATA[qid];
  const answered = Object.keys(qs.answers).length;
  if (answered < qs.questions.length) {
    showInlineWarning(`⚠️ Jawab semua ${qs.questions.length} soal terlebih dahulu`, 2500);
    return;
  }
  qs.submitted = true;
  qs.endTime = Date.now();
  if (quizTimers[qid]) clearInterval(quizTimers[qid]);
  queueQuizResultForOwnerSummary(qid, qs, data);
  openQuizModal(qid);
};

window.resetQuiz = function(qid) {
  if (quizTimers[qid]) clearInterval(quizTimers[qid]);
  quizStates[qid] = null;
  renderContent();
};

// ============ SAVE QUIZ RESULTS (OWNER REPORT) ============
function queueQuizResultForOwnerSummary(qid, qs, data) {
  if (!userData) return;
  
  try {
    // Calculate score
    let score = 0;
    qs.questions.forEach((q, qi) => {
      if (qs.answers[qi] !== undefined) {
        const displayOi = qs.answers[qi];
        const origOi = q.shuffledOptions[displayOi].origIdx;
        if (origOi === q.answer) score++;
      }
    });
    
    const totalQuestions = qs.questions.length;
    const percentage = Math.round(score / totalQuestions * 100);
    const timeSpent = Math.floor((qs.endTime - qs.startTime) / 1000);
    
    // Create owner-facing quiz report object
    const quizResult = {
      recipient: 'pemilik_website',
      user_id: userData.user_id,
      nama_lengkap: userData.nama_lengkap,
      nim: userData.nim,
      kelas: userData.kelas,
      quiz_name: data.title,
      quiz_id: qid,
      score: score,
      total_questions: totalQuestions,
      percentage: percentage,
      time_spent_seconds: timeSpent,
      submitted_at: new Date().toISOString(),
      session_id: SESSION_ID,
    };
    
    pendingOwnerReportResults.push(quizResult);
    localStorage.setItem('atlas_owner_quiz_results_pending', JSON.stringify(pendingOwnerReportResults));
    
    console.log('✓ Quiz result queued for final owner report:', qid, percentage + '%');
  } catch (err) {
    console.error('❌ Failed to queue quiz result for owner:', err);
  }
}

function submitFinalOwnerSummary() {
  if (!pendingOwnerReportResults.length) {
    showInlineWarning('Belum ada hasil kuis yang siap dikirim', 2000);
    return;
  }

  try {
    const ownerResults = JSON.parse(localStorage.getItem('atlas_owner_quiz_results') || '[]');
    ownerResults.push(...pendingOwnerReportResults);
    localStorage.setItem('atlas_owner_quiz_results', JSON.stringify(ownerResults));

    const blob = new Blob([JSON.stringify(ownerResults, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ringkasan-hasil-kuis-pemilik-website-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    pendingOwnerReportResults = [];
    localStorage.removeItem('atlas_owner_quiz_results_pending');
    showInlineWarning('✅ Ringkasan akhir berhasil dikirim', 2500);
    renderContent();
  } catch (err) {
    console.error('❌ Failed to send final owner report:', err);
  }
}

// Timer management
function startQuizTimer(qid) {
  if (quizTimers[qid]) clearInterval(quizTimers[qid]);
  let elapsed = 0;
  const timerEl = document.getElementById(`timer-${qid}`);
  if (!timerEl) return;
  
  const updateTimer = () => {
    elapsed = Math.floor((Date.now() - quizStates[qid].startTime) / 1000);
    const remaining = Math.max(0, QUIZ_TIME_LIMIT - elapsed);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    timerEl.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
    
    if (remaining <= 60 && timerEl.parentElement) {
      timerEl.parentElement.className = timerEl.parentElement.className.replace('text-steel', 'text-red-600 font-bold');
    }
    
    if (remaining === 0) {
      clearInterval(quizTimers[qid]);
      quizStates[qid].submitted = true;
      quizStates[qid].timeExpired = true;
      quizStates[qid].endTime = Date.now();
      renderContent();
    }
  };
  
  updateTimer();
  quizTimers[qid] = setInterval(updateTimer, 1000);
}

window.openSketchfabLink = function() {

  if (!input || !input.value.trim()) {
    showInlineWarning('⚠️ Paste URL Sketchfab terlebih dahulu', 2000);
    return;
  }
  
  let url = input.value.trim();
  
  // Extract model ID or validate URL
  let modelId = '';
  const embedMatch = url.match(/models\/([a-f0-9-]{1,})/i);
  if (embedMatch) {
    modelId = embedMatch[1];
  } else if (url.match(/^[a-f0-9-]{1,}$/i)) {
    // Direct model ID
    modelId = url;
  } else if (url.includes('sketchfab.com')) {
    showInlineWarning('❌ Format URL tidak valid. Gunakan link dengan /models/', 2500);
    return;
  } else {
    showInlineWarning('❌ Format URL tidak valid. Paste URL dari Sketchfab', 2500);
    return;
  }
  
  if (!modelId) {
    showInlineWarning('⚠️ Model ID tidak ditemukan', 2000);
    return;
  }
  
  const sketchfabUrl = `https://sketchfab.com/models/${modelId}`;
  window.open(sketchfabUrl, '_blank', 'noopener,noreferrer');
  showInlineWarning('✅ Membuka model di Sketchfab...', 2000);
};


// ============ ELEMENT SDK ============
const defaultConfig = {
  site_title: 'Atlas Anatomi Skeletal',
  welcome_heading: 'Selamat Datang di\nAtlas Anatomi Skeletal',
  welcome_text: 'Platform pembelajaran interaktif sistem skeletal manusia untuk mahasiswa kedokteran. Dilengkapi materi sistematis, visual 3D, dan kuis interaktif.',
  background_color: '#F8F9FB',
  surface_color: '#FFFFFF',
  text_color: '#546E7A',
  primary_color: '#0B1D3A',
  accent_color: '#1565C0',
  font_family: 'DM Sans',
  font_size: 14,
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  const el = (id) => document.getElementById(id);

  // Text
  const st = el('site-title-text');
  if (st) st.textContent = c.site_title;
  const wh = el('welcome-heading');
  if (wh) wh.innerHTML = (c.welcome_heading || defaultConfig.welcome_heading).replace(/\n/g, '<br>');
  const wt = el('welcome-text');
  if (wt) wt.textContent = c.welcome_text;

  // Colors
  document.body.style.backgroundColor = c.background_color;
  const app = el('app');
  if (app) app.style.backgroundColor = c.background_color;

  // Navbar
  const nav = el('navbar');
  if (nav) nav.style.backgroundColor = c.primary_color;

  // Surfaces
  document.querySelectorAll('.bg-white, .bg-bone').forEach(e => {
    if (e.id === 'sidebar' || e.closest('#sidebar')) e.style.backgroundColor = c.surface_color;
  });

  // Accent
  document.documentElement.style.setProperty('--accent', c.accent_color);
  document.querySelectorAll('.bg-ocean, .bg-sky').forEach(e => {
    if (e.classList.contains('bg-ocean')) e.style.backgroundColor = c.accent_color;
  });

  // Font
  const font = c.font_family || defaultConfig.font_family;
  document.body.style.fontFamily = `${font}, sans-serif`;

  // Font size
  const bs = c.font_size || defaultConfig.font_size;
  document.body.style.fontSize = `${bs}px`;
}

// Initialize elementSdk safely (deferred to after app loads)
function initElementSdk() {
  try {
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { 
          try { 
            applyConfig(config); 
          } catch(e) { 
            console.warn('applyConfig error:', e); 
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
            { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
        }),
        mapToEditPanelValues: (config) => new Map([
          ['site_title', config.site_title || defaultConfig.site_title],
          ['welcome_heading', config.welcome_heading || defaultConfig.welcome_heading],
          ['welcome_text', config.welcome_text || defaultConfig.welcome_text],
        ]),
      });
      console.log('✓ elementSdk initialized successfully');
    }
  } catch(e) {
    console.warn('elementSdk initialization error:', e.message);
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  console.log('✓ DOMContentLoaded fired');

  const params = new URLSearchParams(window.location.search);
  const resetRegistration = params.get('reset') === '1';
  const isLocalFile = window.location.protocol === 'file:';

  if (resetRegistration || isLocalFile) {
    localStorage.removeItem('atlas_user');
  }
  
  // Check if user already registered
  const isRegistered = checkRegistration();
  console.log('✓ Registration check:', isRegistered ? 'Registered' : 'Not registered');
  
  if (!isRegistered || resetRegistration || isLocalFile) {
    console.log('✓ Showing registration screen...');
    showRegistration();
    buildRegistrationForm();
  } else {
    console.log('✓ User is registered, showing app...');
    hideRegistration();
    updateUserWatermark();
    
    // Set currentPage to home BEFORE rendering
    currentPage = 'home';
    
    // Build UI
    console.log('✓ Building sidebar...');
    buildSidebar();
    console.log('✓ Rendering content...');
    renderContent();
    
    // Create Lucide icons
    console.log('✓ Creating Lucide icons...');
    lucide.createIcons();
    
    // Initialize Element SDK
    console.log('✓ Initializing Element SDK...');
    initElementSdk();
    
    console.log('✓ Initialization complete!');
  }
}, { once: true });
